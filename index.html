
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Temperatur Monitor</title>
  <style>
    body { font-family: Arial; background:#111; color:white; text-align:center; }
    .card { background:#222; padding:20px; margin:20px auto; width:300px; border-radius:20px; }
  </style>
</head>
<body>

<h1>🌡️ Live Temperaturen</h1>

<div class="card">
  <h2>Dial 1</h2>
  <p id="d1">--</p>
</div>

<div class="card">
  <h2>Dial 2</h2>
  <p id="d2">--</p>
</div>

<script>

const url = "https://YOUR_PROJECT.supabase.co/rest/v1/temps?select=*";
const apiKey = "YOUR_API_KEY";

async function loadData() {
  const res = await fetch(url, {
    headers: {
      apikey: apiKey,
      Authorization: "Bearer " + apiKey
    }
  });

  const data = await res.json();

  data.forEach(d => {
    if(d.id === "dial1")
      document.getElementById("d1").innerText = `${d.obj}°C | ${d.amb}°C`;

    if(d.id === "dial2")
      document.getElementById("d2").innerText = `${d.obj}°C | ${d.amb}°C`;
  });
}

setInterval(loadData, 5000);
loadData();

</script>

</body>
</html>
