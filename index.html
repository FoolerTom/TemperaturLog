<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Temperatur Verlauf</title>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      background: #111;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    h1 {
      margin-top: 20px;
    }

    canvas {
      width: 95% !important;
      height: 40vh !important;
      margin: 20px auto;
      display: block;
    }
  </style>
</head>

<body>

<h1>Temperatur Verlauf!</h1>

<h2>Letzte 2 Stunden</h2>
<canvas id="chart2h"></canvas>

<h2>Letzte 48 Stunden</h2>
<canvas id="chart48h"></canvas>

<script>

const baseUrl = "https://flpujlogtzczxrcjopfj.supabase.co/rest/v1/temps_local";
const apiKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZscHVqbG9ndHpjenhyY2pvcGZqIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MjI4NzU0NiwiZXhwIjoyMDk3ODYzNTQ2fQ.OAxrQi81OjMxuJwpMTukkLmqTf0Uvmhyj3VyXs99zUY";
let charts = {}; 
const authHeaders = {
  apikey: apiKey,
  Authorization: "Bearer " + apiKey
};

async function fetchAllData() {
  const pageSize = 1000;
  let page = 0;
  let all = [];

  while (true) {
    const url = `${baseUrl}?select=*&order=updated_at.desc&limit=${pageSize}&offset=${page * pageSize}`;
    const res = await fetch(url, { headers: authHeaders });
    if (!res.ok) {
      throw new Error(`Supabase request failed: ${res.status} ${res.statusText}`);
    }

    const pageData = await res.json();
    console.log("Supabase page", page, "rows", pageData.length, "url", url);

    if (!Array.isArray(pageData) || pageData.length === 0) {
      break;
    }

    all.push(...pageData);
    if (pageData.length < pageSize) {
      break;
    }

    page += 1;
    if (page >= 10) {
      console.log("Reached max pagination pages", page);
      break;
    }
  }

  return all;
}

function parseLocalTime(d) {
  if (!d) return new Date(NaN);

  const local = String(d.local_time || "").trim();
  const timeOnly = local.match(/^(\d{1,2}):(\d{2})(?::(\d{2}))?$/);
  if (timeOnly && d.updated_at) {
    const baseDate = new Date(d.updated_at);
    if (!isNaN(baseDate.getTime())) {
      baseDate.setHours(Number(timeOnly[1]), Number(timeOnly[2]), Number(timeOnly[3] || 0), 0);
      return baseDate;
    }
  }

  if (local) {
    const parsed = new Date(local);
    if (!isNaN(parsed.getTime())) {
      return parsed;
    }
  }

  return d.updated_at ? new Date(d.updated_at) : new Date(NaN);
}

async function loadData() 
{
  try {
    const data = await fetchAllData();
    console.log("Supabase total rows", data.length, "first", data[0]?.local_time, data[0]?.updated_at, "last", data[data.length-1]?.local_time, data[data.length-1]?.updated_at);

    const now = Date.now();

    let map2h = {};
    let map48h = {};

    // Daten nach Messzeit sortieren
    data.sort((a, b) => parseLocalTime(a) - parseLocalTime(b));

    data.forEach(d => {
      const t = parseLocalTime(d);
      if (isNaN(t)) return;
      const diff = (now - t.getTime()) / 1000 / 60;

      const key = t.getTime();
      console.log(diff);

      if (diff < 120) {
        if (!map2h[key]) map2h[key] = { t: t };
        if (d.id === "dial1") map2h[key].d1 = d.amb;
        if (d.id === "dial2") map2h[key].d2 = d.amb;
      }

      if (diff < 2880) {
        if (!map48h[key]) map48h[key] = { t: t };
        if (d.id === "dial1") map48h[key].d1 = d.amb;
        if (d.id === "dial2") map48h[key].d2 = d.amb;
      }
    });

    // ---------- 2h Daten ----------
    let values2h = Object.values(map2h).sort((a, b) => a.t - b.t);

    let labels2h = values2h.map(e =>
      e.t.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
    );

    let d1_2h = values2h.map(e => e.d1 ?? null);
    let d2_2h = values2h.map(e => e.d2 ?? null);

    // ---------- 48h Daten ----------
    let values48h = Object.values(map48h).sort((a, b) => a.t - b.t);

    let labels48h = values48h.map(e =>
      e.t.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' })
    );

    let d1_48h = values48h.map(e => e.d1 ?? null);
    let d2_48h = values48h.map(e => e.d2 ?? null);

    drawChart("chart2h", labels2h, d1_2h, d2_2h);
    drawChart("chart48h", labels48h, d1_48h, d2_48h);

  } catch (e) {
    console.log("Fehler:", e);
  }
}

// ---------- Chart Funktion ----------
function drawChart(id, labels, d1, d2)
{
  if (charts[id] && typeof charts[id].destroy === "function") {
    charts[id].destroy();
  }

  charts[id] = new Chart(document.getElementById(id), {
    type: "line",
    data: {
      labels: labels,
      datasets: [
        {
          label: "aussen",
          data: d1,
          borderColor: "red",
          borderWidth: 2,
          pointRadius: 0,
          spanGaps: true
        },
        {
          label: "innen",
          data: d2,
          borderColor: "cyan",
          borderWidth: 2,
          pointRadius: 0,
          spanGaps: true
        }
      ]
    },
    options: {
      responsive: true,
      plugins: {
        legend: {
          labels: { color: "white" }
        }
      },
      scales: {
        x: {
          ticks: {
            color: "white",
            autoSkip: true,
            maxTicksLimit: 6  
          }
        },
        y: {
          ticks: {
            color: "white"
          }
        }
      }
    }
  });
}

// alle 10 Sekunden aktualisieren
setInterval(loadData, 10000);

// sofort starten
loadData();

</script>

</body>
</html>
